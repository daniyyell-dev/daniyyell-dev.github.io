<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Head content -->
</head>
<body>
    <header>
        <!-- Header content -->
    </header>
    <main>
        {% for post in site.posts %}
            <article>
                <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
                <p>{{ post.excerpt }}</p>
                <div class="author-info">
                    <img src="{{ post.author.avatar }}" alt="{{ post.author.name }}" style="width: 50px; height: 50px; border-radius: 50%;">
                    <p>By {{ post.author.name }}</p>
                </div>
            </article>
        {% endfor %}
    </main>
    <footer>
        <!-- Footer content -->
    </footer>
</body>
</html>
